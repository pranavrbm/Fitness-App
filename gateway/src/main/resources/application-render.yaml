spring:
    application:
        name: api-gateway
    config:
        import: optional:configserver:${CONFIG_SERVER_URL:http://localhost:8888}

eureka:
    client:
        serviceUrl:
            defaultZone: ${EUREKA_SERVER_URL:http://localhost:8761/eureka}

server:
    port: ${PORT:8080}

# Service URLs for gateway routes
services:
    activity:
        url: ${ACTIVITY_SERVICE_URL:http://localhost:8080}
    user:
        url: ${USER_SERVICE_URL:http://localhost:8080}
    ai:
        url: ${AI_SERVICE_URL:http://localhost:8080}
