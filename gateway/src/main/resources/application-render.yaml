spring:
    application:
        name: api-gateway
    config:
        import: optional:configserver:http://${CONFIG_SERVER_HOSTPORT:localhost:8888}

eureka:
    client:
        serviceUrl:
            defaultZone: http://${EUREKA_SERVER_HOSTPORT:localhost:8761}/eureka

server:
    port: ${PORT:8080}

# Service URLs for gateway routes
services:
    activity:
        url: http://${ACTIVITY_SERVICE_HOSTPORT:localhost:8080}
    user:
        url: http://${USER_SERVICE_HOSTPORT:localhost:8080}
    ai:
        url: http://${AI_SERVICE_HOSTPORT:localhost:8080}
