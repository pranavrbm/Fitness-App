services:
    - type: web
      name: config-server
      runtime: docker
      dockerfilePath: ./configserver/Dockerfile
      dockerContext: ./configserver
      autoDeploy: true
      envVars:
          - key: SPRING_PROFILES_ACTIVE
            value: render

    - type: web
      name: eureka-server
      runtime: docker
      dockerfilePath: ./eureka/Dockerfile
      dockerContext: ./eureka
      autoDeploy: true
      envVars:
          - key: SPRING_PROFILES_ACTIVE
            value: render

    - type: web
      name: activity-service
      runtime: docker
      dockerfilePath: ./activityservice/Dockerfile
      dockerContext: ./activityservice
      autoDeploy: true
      envVars:
          - key: SPRING_PROFILES_ACTIVE
            value: render
          - key: MONGODB_URI
            sync: false
          - key: CONFIG_SERVER_HOSTPORT
            fromService:
                type: web
                name: config-server
                property: hostport
          - key: EUREKA_SERVER_HOSTPORT
            fromService:
                type: web
                name: eureka-server
                property: hostport

    - type: web
      name: user-service
      runtime: docker
      dockerfilePath: ./userservice/Dockerfile
      dockerContext: ./userservice
      autoDeploy: true
      envVars:
          - key: SPRING_PROFILES_ACTIVE
            value: render
          - key: MONGODB_URI
            sync: false
          - key: CONFIG_SERVER_HOSTPORT
            fromService:
                type: web
                name: config-server
                property: hostport
          - key: EUREKA_SERVER_HOSTPORT
            fromService:
                type: web
                name: eureka-server
                property: hostport

    - type: web
      name: ai-service
      runtime: docker
      dockerfilePath: ./aiservice/Dockerfile
      dockerContext: ./aiservice
      autoDeploy: true
      envVars:
          - key: SPRING_PROFILES_ACTIVE
            value: render
          - key: MONGODB_URI
            sync: false
          - key: CONFIG_SERVER_HOSTPORT
            fromService:
                type: web
                name: config-server
                property: hostport
          - key: EUREKA_SERVER_HOSTPORT
            fromService:
                type: web
                name: eureka-server
                property: hostport

    - type: web
      name: api-gateway
      runtime: docker
      dockerfilePath: ./gateway/Dockerfile
      dockerContext: ./gateway
      autoDeploy: true
      envVars:
          - key: SPRING_PROFILES_ACTIVE
            value: render
          - key: CONFIG_SERVER_HOSTPORT
            fromService:
                type: web
                name: config-server
                property: hostport
          - key: EUREKA_SERVER_HOSTPORT
            fromService:
                type: web
                name: eureka-server
                property: hostport
          - key: ACTIVITY_SERVICE_HOSTPORT
            fromService:
                type: web
                name: activity-service
                property: hostport
          - key: USER_SERVICE_HOSTPORT
            fromService:
                type: web
                name: user-service
                property: hostport
          - key: AI_SERVICE_HOSTPORT
            fromService:
                type: web
                name: ai-service
                property: hostport

    - type: web
      name: fitness-frontend
      runtime: docker
      dockerfilePath: ./fitness-app-frontend/Dockerfile
      dockerContext: ./fitness-app-frontend
      autoDeploy: true
      envVars:
          - key: VITE_API_URL
            sync: false
